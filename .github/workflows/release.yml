name: "Publish Release"

on:
  push:
    tags:
      - 'v.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v.__VERSION__
          releaseName: "🔨 AnvilCraft Panel v.__VERSION__ (Beta)"
          releaseBody: |
            > ⚠️ **Beta release** — This software is under active development.

            See the [full changelog](https://github.com/cPathz/AnvilCraft-Panel/releases) for details on what changed in this version.

            ## 📥 Installation
            Download the `.exe` installer below and run it. Windows may show a SmartScreen warning — click **More info → Run anyway**.

            ## 🔄 Auto-update
            If you already have AnvilCraft Panel installed, it will detect this update automatically and prompt you to install it.

            ## 💬 Community
            Join the Discord server for support and feedback: **discord.gg/E4PFVUe8vz**
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
